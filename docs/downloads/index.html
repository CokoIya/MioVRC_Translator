<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mio Translator Downloads</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6fb;
      --panel: #ffffff;
      --text: #162033;
      --muted: #64748b;
      --accent: #1677ff;
      --border: #d9e2f1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 70%);
      color: var(--text);
    }
    .card {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(22, 32, 51, 0.08);
    }
    h1 { margin: 0 0 12px; font-size: 30px; }
    p { margin: 0 0 14px; line-height: 1.7; }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(100%, 320px);
      min-height: 58px;
      padding: 13px 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid transparent;
    }
    .primary {
      background: var(--accent);
      color: #fff;
    }
    .secondary {
      border-color: var(--border);
      color: var(--text);
      background: #fff;
    }
    .meta {
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Mio Translator Downloads</h1>
    <p>这里是官网正式版下载页。当前官网提供的安装包版本为 <strong>v1.2.2</strong>。</p>
    <p>GitHub Releases 不再同步后续正式版更新，目前仅保留 <strong>v1.2.1</strong> 稳定版；之后的新版本请以官网下载安装为准。</p>
    <div class="actions">
      <a class="primary" href="./MioTranslator-Setup-v1.2.2.exe" download="MioTranslator-Setup-v1.2.2.exe">下载 v1.2.2 安装包</a>
      <a class="secondary" href="https://github.com/CokoIya/MioVRC_Translator/releases">查看 GitHub Releases（仅 v1.2.1 稳定版）</a>
    </div>
    <p class="meta">如果你是从首页跳转过来的，这里就是当前官网版本的手动下载入口。</p>
  </main>
</body>
</html>
